<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Viewport Pepper: 1 CSS pixel = 1 pixel physique tablette -->
  <meta name="viewport" content="width=746, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Évaluation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a1628;
      font-family: Arial, sans-serif;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .card {
      background: #0d2040;
      border: 2px solid #1e4080;
      border-radius: 16px;
      padding: 36px 48px;
      text-align: center;
      width: 680px;
      -webkit-box-shadow: 0 8px 40px rgba(0,0,0,0.6);
              box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    h1 {
      color: #ffffff;
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #8aaddd;
      font-size: 15px;
      margin-bottom: 32px;
    }

    /* === ÉTOILES === */
    .stars {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .star {
      font-size: 64px;
      cursor: pointer;
      color: #f5c518; /* DORÉ par défaut */
      line-height: 1;
      -webkit-transition: color 0.15s, -webkit-transform 0.1s;
              transition: color 0.15s, transform 0.1s;
      display: inline-block;
      -webkit-user-select: none;
         -moz-user-select: none;
              user-select: none;
      /* Zone de toucher plus large */
      padding: 8px;
    }

    .star.empty {
      color: #2a4a7a;
    }

    .star.active {
      color: #f5c518;
      -webkit-transform: scale(1.15);
              transform: scale(1.15);
    }

    /* === FEEDBACK === */
    #feedback {
      color: #c8d8f0;
      font-size: 17px;
      min-height: 26px;
      margin-bottom: 28px;
    }

    /* === BOUTONS === */
    .buttons {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      gap: 20px;
    }

    button {
      font-size: 18px;
      font-weight: bold;
      padding: 14px 44px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      min-width: 160px;
      -webkit-transition: opacity 0.15s, -webkit-transform 0.1s;
              transition: opacity 0.15s, transform 0.1s;
    }

    button:active {
      -webkit-transform: scale(0.96);
              transform: scale(0.96);
      opacity: 0.85;
    }

    #submitBtn {
      background: #f5c518;
      color: #0a1628;
    }

    #clearBtn {
      background: #1e4080;
      color: #ffffff;
      border: 2px solid #3a6abf;
    }

    /* Message de confirmation */
    #confirmMsg {
      display: none;
      margin-top: 20px;
      color: #4cde94;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Évaluer la communication avec le robot</h1>
    <p class="subtitle">Touchez une étoile (1 à 5).</p>

    <div class="stars" id="starGroup">
      <span class="star active" id="s1" data-val="1">&#9733;</span>
      <span class="star active" id="s2" data-val="2">&#9733;</span>
      <span class="star active" id="s3" data-val="3">&#9733;</span>
      <span class="star active" id="s4" data-val="4">&#9733;</span>
      <span class="star active" id="s5" data-val="5">&#9733;</span>
    </div>

    <p id="feedback">Toutes les étoiles sélectionnées (5)</p>

    <div class="buttons">
      <button id="submitBtn" onclick="submitRating()">Envoyer</button>
      <button id="clearBtn" onclick="clearRating()">Effacer</button>
    </div>

    <p id="confirmMsg">✓ Merci ! Votre note a été enregistrée.</p>
  </div>

  <script>
    // === ES5 pur — compatible WebView Android ancien ===
    var currentRating = 5; // démarre à 5 étoiles dorées

    var stars = [
      document.getElementById('s1'),
      document.getElementById('s2'),
      document.getElementById('s3'),
      document.getElementById('s4'),
      document.getElementById('s5')
    ];

    // Attacher les événements touch ET click (double sécurité Pepper)
    for (var i = 0; i < stars.length; i++) {
      (function(idx) {
        var val = idx + 1;
        stars[idx].onclick = function() { setRating(val); };
        stars[idx].ontouchend = function(e) {
          e.preventDefault();
          setRating(val);
        };
      })(i);
    }

    function setRating(val) {
      currentRating = val;
      updateVisuals();
      document.getElementById('confirmMsg').style.display = 'none';
    }

    function updateVisuals() {
      for (var i = 0; i < stars.length; i++) {
        if (i < currentRating) {
          stars[i].className = 'star active';
        } else {
          stars[i].className = 'star empty';
        }
      }
      if (currentRating === 0) {
        document.getElementById('feedback').innerHTML = 'Aucune note sélectionnée';
      } else {
        document.getElementById('feedback').innerHTML =
          'Note sélectionnée : ' + currentRating + ' étoile' + (currentRating > 1 ? 's' : '');
      }
    }

    function clearRating() {
      currentRating = 0;
      updateVisuals();
      document.getElementById('confirmMsg').style.display = 'none';
    }

    function submitRating() {
      if (currentRating < 1) {
        document.getElementById('feedback').innerHTML =
          '⚠ Veuillez sélectionner au moins 1 étoile.';
        return;
      }

      document.getElementById('feedback').innerHTML = 'Envoi en cours...';

      // XMLHttpRequest ES5 (pas fetch — pas supporté sur vieux WebView)
      var xhr = new XMLHttpRequest();
      xhr.open('POST', '/api/evaluate', true);
      xhr.setRequestHeader('Content-Type', 'application/json');

      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var resp = JSON.parse(xhr.responseText);
              document.getElementById('feedback').innerHTML =
                resp.message || 'Merci pour votre retour !';
            } catch(e) {
              document.getElementById('feedback').innerHTML = 'Merci pour votre retour !';
            }
            document.getElementById('confirmMsg').style.display = 'block';
          } else {
            // Sauvegarde locale si échec réseau
            document.getElementById('feedback').innerHTML =
              'Note enregistrée localement.';
            saveLocal(currentRating);
            document.getElementById('confirmMsg').style.display = 'block';
          }
        }
      };

      xhr.onerror = function() {
        document.getElementById('feedback').innerHTML = 'Note enregistrée localement.';
        saveLocal(currentRating);
        document.getElementById('confirmMsg').style.display = 'block';
      };

      try {
        xhr.send(JSON.stringify({ rating: currentRating }));
      } catch(e) {
        saveLocal(currentRating);
        document.getElementById('confirmMsg').style.display = 'block';
      }
    }

    function saveLocal(val) {
      try {
        var pending = [];
        var stored = localStorage.getItem('pending_ratings');
        if (stored) { pending = JSON.parse(stored); }
        pending.push({ rating: val, ts: new Date().getTime() });
        localStorage.setItem('pending_ratings', JSON.stringify(pending));
      } catch(e) {}
    }

    // Init
    updateVisuals();
  </script>
</body>
</html>
