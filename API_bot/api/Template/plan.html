<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=746, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Plan CERI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    font-family: Arial, sans-serif;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
  }
 
  /* Conteneur principal centré, taille fixe tablette */
  #app {
    width: 746px;
    height: 1024px;
    overflow: hidden;
    background: #0b1e35;
    position: relative;
    -webkit-flex-shrink: 0;
    flex-shrink: 0;
  }

  /* ── HEADER ── */
  #header {
    background: #0d2a4a;
    border-bottom: 2px solid #1c4a80;
    padding: 10px 16px;
    display: -webkit-box; display: -webkit-flex; display: flex;
    -webkit-box-align: center; align-items: center;
    -webkit-box-pack: justify; justify-content: space-between;
    height: 60px;
  }
  #header h1 { font-size: 18px; font-weight: bold; color: #f5c518; }
  #header p,  h2  { font-size: 16px; color: #5a8ab0; margin-top: 2px; }

  /* ── LEVEL BUTTONS ── */
  #levelBtns { display: -webkit-box; display: flex; gap: 10px; }
  .lvlBtn {
    background: #1a3a5c;
    color: #8aaddd;
    border: 2px solid #1c4a80;
    border-radius: 8px;
    padding: 8px 22px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    min-width: 110px;
    text-align: center;
  }
  .lvlBtn.active {
    background: #4fa3e0;
    color: #000;
    border-color: #4fa3e0;
  }
  .lvlBtn:active { opacity: 0.8; }

  /* ── MAP CONTAINER ── */
  #mapWrap {
    position: relative;
    width: 746px;
    height: 560px;
    overflow: hidden;
    background: #f0f0f0;
    display: block;
  }

.planImg {
    position: absolute;
    top: 0; left: 0;
    width: 746px;
    height: auto;
    object-fit: cover;
    object-position: center center;
  }


  /* ── LABEL ── */
  .youLabel {
    position: absolute;
    background: #ff2222;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 11;
    pointer-events: none;
  }
  .youLabel:after {
    content: '';
    position: absolute;
    bottom: -6px; left: 50%;
    margin-left: -5px;
    border: 5px solid transparent;
    border-top-color: #ff2222;
  }

  /* pulse animation */
  @-webkit-keyframes pulse {
    0%   { box-shadow: 0 0 0 3px rgba(255,34,34,0.5); }
    50%  { box-shadow: 0 0 0 10px rgba(255,34,34,0.0); }
    100% { box-shadow: 0 0 0 3px rgba(255,34,34,0.5); }
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 3px rgba(255,34,34,0.5); }
    50%  { box-shadow: 0 0 0 10px rgba(255,34,34,0.0); }
    100% { box-shadow: 0 0 0 3px rgba(255,34,34,0.5); }
  }
  .youDot {
    -webkit-animation: pulse 1.4s ease-in-out infinite;
            animation: pulse 1.4s ease-in-out infinite;
  }
</style>
</head>
<body>
<div id="app">
<div id="header">
  <div>
    <h1>Campus Jean-Henri Fabre</h1>
    <h2>CERI — Plan du bâtiment</h2>
  </div>
  <div id="levelBtns">
    <button class="lvlBtn active" onclick="showLevel(0)">Niveau 0</button>
    <button class="lvlBtn"        onclick="showLevel(1)">Niveau 1</button>
  </div>
</div>

<div id="mapWrap">

  <!-- NIVEAU 0 image -->
  <img id="img0" class="planImg"
       src="{{ url_for('static', filename='IMG/niveau0.png') }}"
       alt="Plan Niveau 0" />

  <!-- NIVEAU 1 image (hidden by default) -->
  <img id="img1" class="planImg"
       src="{{ url_for('static', filename='IMG/niveau1.png') }}"
       alt="Plan Niveau 1"
       style="display:none" />

</div>

<script>
var currentLevel = 0;

function showLevel(n) {
  currentLevel = n;

  // Images
  document.getElementById('img0').style.display  = (n === 0) ? 'block' : 'none';
  document.getElementById('img1').style.display  = (n === 1) ? 'block' : 'none';

  // Buttons
  var btns = document.getElementById('levelBtns').getElementsByClassName('lvlBtn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].className = 'lvlBtn' + (i === n ? ' active' : '');
  }
}
</script>
</div>
</body>
</html>
